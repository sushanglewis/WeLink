# lc-* 命令单一事实源(Single source of truth)
# 三个 harness manifest(claude-code.yaml / codex.yaml / opencode.yaml)通过
# command_map_source: command-map.yaml 引用本文件。
# 新增/修改命令只需改这里,CI 漂移校验保证三端一致。

commands:
  lc-status:
    description: 显示当前 Lincoln 阶段状态与下一步动作
    action: python3 scripts/lincoln-status.py
  lc-setup:
    description: 安装/检查 Lincoln 依赖并生成 harness 适配产物
    action: python3 scripts/lincoln-setup.py
  lc-init-branch:
    description: 初始化 issue 工作包(分支 + workflow-stage.yaml)
    action: bash scripts/init-lincoln-branch.sh
    args_hint: --issue-number <N>
  lc-validate:
    description: 运行当前阶段的准入校验(validate-entry)
    action: python3 scripts/stage_loader.py
    args_hint: --stage <current_stage> --action validate-entry
  lc-handoff:
    description: 生成阶段 handoff 报告
    action: python3 scripts/stage_loader.py
    args_hint: --stage <current_stage> --action handoff-report
  lc-submit:
    description: 提交当前阶段产物(写入 workflow-stage.yaml 并刷新 documents.yaml)
    action: python3 scripts/stage_loader.py
    args_hint: --stage <current_stage> --action record-artifacts
  lc-approve:
    description: 人类 PM 确认当前阶段 gate 通过(仅 human_gate 阶段)
    action: python3 scripts/stage_loader.py
    args_hint: --stage <current_stage> --action approve-gate
  lc-benchmark:
    description: 运行 Lincoln benchmark 报告（需显式调用）
    action: python3 scripts/lc-benchmark-cli.py
    args_hint: "[--trigger manual|handoff|pr_created|pr_merged|session_stop]"
  lc-wf-list:
    description: 列出所有已注册的 Lincoln workflow 及其执行模式(solo/team)
    action: python3 scripts/lincoln_workflow.py
    args_hint: list
  lc-wf-interview-to-knowledge:
    description: 启动访谈到知识库完整 SOP(team 模式,需 --issue-number)
    action: python3 scripts/lincoln_workflow.py
    args_hint: --workflow interview-to-knowledge --issue-number <N> start
  lc-wf-bug-fix:
    description: 启动 bug 快速修复工作流(solo 模式,实例写入 .context/workflow/)
    action: python3 scripts/lincoln_workflow.py
    args_hint: --workflow bug-fix start
  lc-wf-design-spike:
    description: 启动方案预研工作流(solo 模式,实例写入 .context/workflow/)
    action: python3 scripts/lincoln_workflow.py
    args_hint: --workflow design-spike start
  lc-wf-existing-project-iteration:
    description: 启动已有项目迭代工作流(solo 模式,实例写入 .context/workflow/)
    action: python3 scripts/lincoln_workflow.py
    args_hint: --workflow existing-project-iteration start
  lc-wf-oss-first-design:
    description: 启动开源方案优先设计工作流(solo 模式,实例写入 .context/workflow/)
    action: python3 scripts/lincoln_workflow.py
    args_hint: --workflow oss-first-design start
