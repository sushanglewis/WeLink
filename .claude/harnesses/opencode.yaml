# opencode harness manifest
# 生成:.opencode/agent/*.md(角色)+ .opencode/command/lc-*.md(命令)
# spike 结论(Context7 /anomalyco/opencode):
#   agent frontmatter 字段:description/mode/model/temperature/tools/permission
#   command 文件:frontmatter(description/agent/model)+ 正文模板($ARGUMENTS)

name: opencode

capabilities:
  # 缺省即关闭(#64):任何未显式声明的能力都可能被 harness 按默认值激活
  # (superpowers codex hooks 陷阱 obra/superpowers@7d8d3d4)。新增能力必须显式写出;
  # 空能力显式置 false,不得省略字段。验收测试:tests/test_harness_default_off.py
  hooks: false        # 用插件(.opencode/plugin)替代,本版本从轻不生成
  skills: false       # 以 agent/command 提示词承载
  agents: true
  commands: true

command_map_source: command-map.yaml

targets:
  - kind: agent
    source: .claude/agents/*.md
    output: "{project}/.opencode/agent/{name}.md"
    scope: project
    transform: frontmatter
    fields: [description, mode, model, permission, tools]

  - kind: command
    source: command_map
    output: "{project}/.opencode/command/{name}.md"
    scope: project
    transform: command-template
