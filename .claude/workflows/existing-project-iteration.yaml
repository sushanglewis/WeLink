workflow:
  name: existing-project-iteration
  version: 1.0.0
  description: 已有源码项目的 Lincoln 迭代工作流
  execution_mode: solo
  engine: everything-claude-code

  steps:
    - id: workflow-router
      name: 工作流路由
      description: 会话开场引导后，选择最适合当前场景的工作流模板
      action: lc-workflow-router
      artifacts:
        - "{process_slug}/workflow-stage.yaml"

    - id: build-codebase-knowledge
      name: 构建代码知识库
      description: 扫描现有代码库，构建业务与技术知识索引
      description: 基于现有源码生成功能知识文档
      entry_checks:
        - check: codebase_not_yet_documented
      action: lc-build-codebase-knowledge
      artifacts:
        - knowledge/03-features/
        - knowledge/00-index.md
      exit_checks:
        - check: codebase_knowledge_ready

    - id: clarify
      name: 需求澄清
      description: 与人类 PM 多轮澄清，形成统一需求文档
      human_gate: true
      action: clarify-requirements
      artifacts:
        - "{process_slug}/requirements/{session_id}/requirements.md"
      exit_checks:
        - check: requirements_has_background_problem_solution_acceptance
        - check: human_approved

    - id: product-design-docs
      name: 产品设计文档
      description: 产出设计文档（场景、功能目录、数据模型、流程、可行性）
      human_gate: true
      action: draft-product-design
      artifacts:
        - "{process_slug}/designs/{design_id}/design-review.md"
      exit_checks:
        - check: design_docs_complete
        - check: design_docs_human_approved

    - id: product-prototype
      name: 产品原型
      description: 产出 Pencil 原型与 UI 规格
      human_gate: true
      action: build-product-prototype
      artifacts:
        - "{process_slug}/designs/{design_id}/prototype.pen"
      exit_checks:
        - check: prototype_artifact_complete

    - id: tdd-development-plan
      name: TDD 研发计划
      description: 产出 TDD 研发计划（验收映射、测试场景、任务切片）
      action: plan-tdd-development
      artifacts:
        - "{process_slug}/designs/{design_id}/tdd-plan.md"
      exit_checks:
        - check: tdd_plan_complete

    - id: propose
      name: OpenSpec 提案
      description: 生成 OpenSpec 变更提案
      action: propose-with-openspec
      cli_command: "openspec propose {change_name}"
      artifacts:
        - "{process_slug}/openspec/changes/{change_name}/"
      exit_checks:
        - check: openspec_artifact_complete
        - check: tasks_extracted

    - id: split
      name: 拆分到 GitHub
      description: 将 OpenSpec 任务拆分为 GitHub Issues
      action: split-to-github
      artifacts:
        - .github/linked-issues.yaml
      exit_checks:
        - check: issues_created
        - check: tasks_link_back_to_issues

    - id: implement
      name: 研发实现
      description: 按 TDD 实施并完成验证
      human_gate: true

    - id: sync-knowledge
      name: 同步到知识库
      description: 将业务与技术知识沉淀到 Obsidian vault
      trigger: on_pr_merge
      action: sync-to-knowledge
      artifacts:
        - knowledge/03-features/{feature_slug}.md
      exit_checks:
        - check: feature_doc_has_business_and_technical_sections
        - check: feature_doc_has_links
        - check: no_conflict_with_existing_knowledge
