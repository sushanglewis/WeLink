workflow:
  name: interview-to-knowledge
  version: 1.0.0
  description: 从访谈录音到 GitHub Issues 再到 Obsidian 知识库沉淀的标准工作流
  loop:
    engine: everything-claude-code
    state_file: "{process_slug}/workflow-stage.yaml"
    on_failure: pause_for_human
    max_retries: 1

  conventions:
    language: zh-CN
    artifact_encoding: utf-8
    timestamp_format: "%Y-%m-%dT%H:%M:%SZ"
    session_id_pattern: "YYYY-MM-DD-descriptive-name"

  steps:
    - id: ingest
      name: 摄入录音
      description: 将音频访谈转写为文本并生成摘要
      entry_checks:
        - check: file_exists
          args: ["{recording_path}"]
        - check: audio_format_supported
          args: ["{recording_path}"]
      action: process-interview
      artifacts:
        - "{process_slug}/interviews/{session_id}/metadata.json"
        - "{process_slug}/interviews/{session_id}/transcript.md"
        - "{process_slug}/interviews/{session_id}/summary.md"
        - "{process_slug}/interviews/{session_id}/raw-insights.md"
      exit_checks:
        - check: transcript_has_timestamps
          args: ["{session_id}"]
        - check: summary_has_key_topics
          args: ["{session_id}"]

    - id: clarify
      name: 需求澄清
      description: 基于访谈内容与人类 PM 多轮澄清，形成统一需求文档
      entry_checks:
        - check: summary_ready
          args: ["{session_id}"]
      action: clarify-requirements
      human_gate: true
      artifacts:
        - "{process_slug}/requirements/{session_id}/requirements.md"
        - "{process_slug}/requirements/{session_id}/user-stories.md"
        - "{process_slug}/requirements/{session_id}/prd.md"
      exit_checks:
        - check: requirements_has_background_problem_solution_acceptance
          args: ["{session_id}"]
        - check: human_approved
          args: ["{session_id}"]

    - id: product-design-docs
      name: 产品设计文档
      description: 基于已确认需求生成面向 PM 评审的简洁产品设计文档包
      entry_checks:
        - check: requirements_approved
          args: ["{session_id}"]
      action: draft-product-design
      human_gate: true
      artifacts:
        - "{process_slug}/designs/{design_id}/design-review.md"
        - "{process_slug}/designs/{design_id}/scenarios.md"
        - "{process_slug}/designs/{design_id}/feature-catalog.md"
        - "{process_slug}/designs/{design_id}/data-model.md"
        - "{process_slug}/designs/{design_id}/flows.md"
        - "{process_slug}/designs/{design_id}/feasibility.md"
      exit_checks:
        - check: design_docs_complete
          args: ["{design_id}"]
        - check: design_docs_human_approved
          args: ["{design_id}"]

    - id: product-prototype
      name: 产品原型
      description: 基于已确认设计文档生成字段、界面规格和 Pencil 原型
      entry_checks:
        - check: product_design_approved
          args: ["{design_id}"]
      action: build-product-prototype
      human_gate: true
      artifacts:
        - "{process_slug}/designs/{design_id}/ui-spec.md"
        - "{process_slug}/designs/{design_id}/fields.md"
        - "{process_slug}/designs/{design_id}/prototype.pen"
      exit_checks:
        - check: prototype_artifact_complete
          args: ["{design_id}"]

    - id: tdd-development-plan
      name: TDD 研发计划
      description: 基于已确认产品设计和原型生成测试驱动研发流程
      entry_checks:
        - check: prototype_ready
          args: ["{design_id}"]
      action: plan-tdd-development
      artifacts:
        - "{process_slug}/designs/{design_id}/tdd-plan.md"
      exit_checks:
        - check: tdd_plan_complete
          args: ["{design_id}"]

    - id: propose
      name: OpenSpec 提案
      description: 基于已确认 TDD 研发计划调用 OpenSpec CLI 生成变更提案 artifact
      entry_checks:
        - check: tdd_plan_ready
          args: ["{design_id}"]
      action: propose-with-openspec
      cli_command: "openspec propose {change_name}"
      input_file: "{process_slug}/designs/{design_id}/tdd-plan.md"
      artifacts:
        - "{process_slug}/openspec/changes/{change_name}/proposal.md"
        - "{process_slug}/openspec/changes/{change_name}/specs/"
        - "{process_slug}/openspec/changes/{change_name}/design.md"
        - "{process_slug}/openspec/changes/{change_name}/tasks.md"
      exit_checks:
        - check: openspec_artifact_complete
          args: ["{change_name}", "{design_id}"]
        - check: tasks_extracted
          args: ["{change_name}"]

    - id: split
      name: 拆分到 GitHub
      description: 将 OpenSpec tasks 拆分为 GitHub Issues
      entry_checks:
        - check: openspec_tasks_ready
          args: ["{change_name}"]
      action: split-to-github
      artifacts:
        - .github/linked-issues.yaml
      exit_checks:
        - check: issues_created
          args: ["{session_id}"]
        - check: tasks_link_back_to_issues
          args: ["{session_id}"]

    - id: implement
      name: 研发实现
      description: 人类研发团队基于 Issues 开发并提交 PR
      entry_checks:
        - check: issues_ready
          args: ["{session_id}"]
      human_gate: true
      note: 人类/研发团队完成代码，PR 合并后自动触发下一步

    - id: sync-knowledge
      name: 同步到知识库
      description: PR 合并后更新 Obsidian vault，沉淀业务和技术知识
      trigger: on_pr_merge
      entry_checks:
        - check: pr_merged
          args: ["{pr_number}"]
        - check: issue_exists
          args: ["{issue_number}"]
      action: sync-to-knowledge
      artifacts:
        - .github/lincoln-sync-queue/pr-{pr_number}.yaml
        - knowledge/01-interviews/{session_id}.md
        - knowledge/02-requirements/{requirement_id}.md
        - knowledge/03-features/{feature_slug}.md
        - knowledge/04-decisions/{decision_id}.md
      exit_checks:
        - check: feature_doc_has_business_and_technical_sections
          args: ["{feature_slug}"]
        - check: feature_doc_has_links
          args: ["{feature_slug}"]
        - check: no_conflict_with_existing_knowledge
          args: ["{feature_slug}"]

  gates:
    human_confirmation_prompt: "请确认当前步骤已完成并可以继续？输入 confirm 继续，或说明需要修改的地方。"
    on_validation_failure: pause_and_report
    on_human_rejection: update_artifact_and_revalidate
