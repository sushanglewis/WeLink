workflow:
  name: design-spike
  version: 1.0.0
  description: 仅做方案预研，不进入研发实现
  execution_mode: solo
  engine: everything-claude-code

  steps:
    - id: workflow-router
      name: 工作流路由
      description: 会话开场引导后，选择最适合当前场景的工作流模板
      action: lc-workflow-router

    - id: clarify
      name: 需求澄清
      description: 与人类 PM 多轮澄清，形成统一需求文档
      human_gate: true
      action: clarify-requirements
      artifacts:
        - "{process_slug}/requirements/{session_id}/requirements.md"
      exit_checks:
        - check: requirements_has_background_problem_solution_acceptance
        - check: human_approved

    - id: product-design-docs
      name: 产品设计文档
      description: 产出设计文档（场景、功能目录、数据模型、流程、可行性）
      human_gate: true
      action: draft-product-design
      artifacts:
        - "{process_slug}/designs/{design_id}/design-review.md"
      exit_checks:
        - check: design_docs_complete
        - check: design_docs_human_approved

    - id: product-prototype
      name: 产品原型
      description: 产出 Pencil 原型与 UI 规格
      human_gate: true
      action: build-product-prototype
      artifacts:
        - "{process_slug}/designs/{design_id}/prototype.pen"
      exit_checks:
        - check: prototype_artifact_complete

    - id: sync-knowledge
      name: 同步到知识库
      description: 将业务与技术知识沉淀到 Obsidian vault
      action: sync-to-knowledge
      artifacts:
        - knowledge/03-features/{feature_slug}.md
      exit_checks:
        - check: feature_doc_has_business_and_technical_sections
        - check: feature_doc_has_links
        - check: no_conflict_with_existing_knowledge
