# wshobson/agents Agent Manifest

本文件声明 Lincoln 需要引用的 wshobson/agents 插件市场中的 agent。

运行 `scripts/sync-external-agents.sh` 会根据本 manifest 把指定 agent 拉取到 `.claude/agents/external/wshobson-agents/`。

这些 agent 供 Lincoln 自有角色通过 `extends` 字段组合使用。

来源：https://github.com/wshobson/agents.git @ main，MIT License。
