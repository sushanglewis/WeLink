schema_version: 2.0.0
id: sync-knowledge
name: Sync Knowledge
description: 'After PR merge, updates Obsidian vault and archives milestone

  artifacts, generating feature docs, decision docs, and interview

  summaries.'
templates: all
prerequisite_stage: implement
next_stage: null
human_gate: false
agent:
  primary: lincoln-knowledge-curator
  reviewers:
  - lincoln-release-coordinator
skills:
  required:
  - gsd:docs-update
  optional:
  - gsd:forensics
  - gsd:milestone-summary
  - openspec:sync-specs
  - oh-my-claudecode:wiki
  - oh-my-claudecode:writer-memory
  - superpowers:verification-before-completion
artifacts:
  required:
  - .github/lincoln-sync-queue/pr-{pr_number}.yaml
  - knowledge/01-interviews/{session_id}.md
  - knowledge/02-requirements/{requirement_id}.md
  - knowledge/03-features/{feature_slug}.md
  - knowledge/04-decisions/{decision_id}.md
context:
  goal: PR 合并后，将代码变更、Issue 讨论、设计决策沉淀到项目 Obsidian 知识库，确保业务知识和技术知识双轨保存，形成可追溯的知识资产。
  constraints: '- 仅通过 scripts/stage_loader.py 更新 {process_slug}/workflow-stage.yaml。

    - 禁止修改 {process_slug}/recordings/ 中的原始文件。

    - 门控评估优先使用 AI 能力：读取产物并推理其完整性，而非仅依赖脚本化检查。

    - 详细执行步骤、模板与工具见对应 skill prompt 和 .claude/agents/<primary_agent>.md。'
gates:
  entry:
  - check: previous_stage_completed
    args:
    - implement
  exit:
  - check: artifacts_present
