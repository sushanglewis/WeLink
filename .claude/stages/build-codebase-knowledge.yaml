schema_version: 2.0.0
id: build-codebase-knowledge
name: Build Codebase Knowledge
description: 'Scans existing source code and builds knowledge base

  for projects entering Lincoln with existing code but no

  feature knowledge base. Triggered by existing-project-iteration

  template after workflow-router.'
templates:
- existing-project-iteration
prerequisite_stage: workflow-router
next_stage: clarify
human_gate: false
agent:
  primary: lincoln-knowledge-curator
  reviewers:
  - lincoln-engineer
  handoff_to: lincoln-pm
skills:
  required: []
  optional: []
artifacts:
  required:
  - knowledge/00-index.md
context:
  goal: 为已有源码项目构建功能知识库，使后续 PM 迭代能基于事实。
  constraints: '- 仅通过 scripts/stage_loader.py 更新 {process_slug}/workflow-stage.yaml。

    - 禁止修改 {process_slug}/recordings/ 中的原始文件。

    - 门控评估优先使用 AI 能力：读取产物并推理其完整性，而非仅依赖脚本化检查。

    - 详细执行步骤、模板与工具见对应 skill prompt 和 .claude/agents/<primary_agent>.md。'
gates:
  entry:
  - check: previous_stage_completed
    args:
    - workflow-router
  exit:
  - check: artifacts_present
