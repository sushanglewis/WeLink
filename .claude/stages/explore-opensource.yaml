schema_version: 2.0.0
id: explore-opensource
name: Explore Open Source
description: 'Researches existing open-source projects that can inform

  or solve the current requirement. Triggered by oss-first-design

  template after clarify.'
templates:
- oss-first-design
prerequisite_stage: clarify
next_stage: product-design-docs
human_gate: false
agent:
  primary: lc-researcher
  reviewers:
  - lc-engineer
  handoff_to: lc-pm
skills:
  required: []
  optional: []
artifacts:
  required:
  - '{process_slug}/docs/research/{change_name}-oss-options.md'
context:
  goal: 在设计阶段探索开源方案，避免从零造轮子，并为实现提供参考。
  constraints: '- 仅通过 scripts/stage_loader.py 更新 {process_slug}/workflow-stage.yaml。

    - 禁止修改 {process_slug}/recordings/ 中的原始文件。

    - 门控评估优先使用 AI 能力：读取产物并推理其完整性，而非仅依赖脚本化检查。

    - 详细执行步骤、模板与工具见对应 skill prompt 和 .claude/agents/<primary_agent>.md。'
gates:
  entry:
  - check: previous_stage_completed
    args:
    - clarify
  exit:
  - check: artifacts_present
