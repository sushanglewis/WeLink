schema_version: 2.0.0
id: product-prototype
name: Product Prototype
description: Generates UI specs, field specs, and Pencil prototypes.
templates:
- interview-to-knowledge
- existing-project-iteration
- design-spike
- oss-first-design
prerequisite_stage: product-design-docs
next_stage: tdd-development-plan
human_gate: true
agent:
  primary: lc-designer
  reviewers:
  - lc-pm
  - lc-frontend-engineer
  handoff_to: lc-engineer
skills:
  required:
  - superpowers:brainstorming
  optional:
  - gsd:ui-phase
  - superpowers:using-git-worktrees
  - oh-my-claudecode:designer
artifacts:
  required:
  - '{process_slug}/designs/{design_id}/ui-spec.md'
  - '{process_slug}/designs/{design_id}/fields.md'
  - '{process_slug}/designs/{design_id}/prototype.pen'
context:
  goal: 将已确认的产品设计文档转化为可交互的 Pencil 原型和开发可用的 UI/字段规格文档。
  constraints: '- 仅通过 scripts/stage_loader.py 更新 {process_slug}/workflow-stage.yaml。

    - 禁止修改 {process_slug}/recordings/ 中的原始文件。

    - 本阶段设有 human_gate，必须获得人类 PM 显式确认后才能进入下一阶段。

    - 门控评估优先使用 AI 能力：读取产物并推理其完整性，而非仅依赖脚本化检查。

    - 详细执行步骤、模板与工具见对应 skill prompt 和 .claude/agents/<primary_agent>.md。'
gates:
  entry:
  - check: previous_stage_completed
    args:
    - product-design-docs
  exit:
  - check: artifacts_present
  - check: human_approved
