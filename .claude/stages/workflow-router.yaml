schema_version: 2.0.0
id: workflow-router
name: Workflow Router
description: 'Entry point. Runs session intake (overview recon, situation judgment,

  Johari confirmation) on cold start, assesses repository context, selects the most

  appropriate workflow template, and initializes workflow-stage.'
templates: all
prerequisite_stage: null
next_stage: null
human_gate: true
agent:
  primary: lc-pm
  reviewers:
  - lc-release-coordinator
  handoff_to: lc-pm
skills:
  required:
  - superpowers:bootstrap
  optional:
  - gsd:new-project
  - gsd:new-milestone
  - oh-my-claudecode:plan
artifacts:
  required:
  - '{process_slug}/workflow-stage.yaml'
context:
  goal: 在会话启动时先做概览级摸排与处境判断（冷启动开场引导），经用户确认后选择最适合的 Lincoln 工作流模板。
  constraints: '- 仅通过 scripts/stage_loader.py 更新 {process_slug}/workflow-stage.yaml。

    - 开场摸排为概览级：只读操作 ≤ 8 次，不读源码实现，不做深度扫描（禁用 lc-build-codebase-knowledge）。

    - 禁止修改 {process_slug}/recordings/ 中的原始文件。

    - 本阶段设有 human_gate，必须获得人类 PM 显式确认后才能进入下一阶段。

    - 门控评估优先使用 AI 能力：读取产物并推理其完整性，而非仅依赖脚本化检查。

    - 详细执行步骤、模板与工具见对应 skill prompt 和 .claude/agents/<primary_agent>.md。'
gates:
  entry: []
  exit:
  - check: artifacts_present
  - check: human_approved
