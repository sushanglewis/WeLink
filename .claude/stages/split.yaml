schema_version: 2.0.0
id: split
name: Split
description: 'Breaks OpenSpec tasks into parallel, independently implementable

  GitHub Issues with clear boundaries and acceptance criteria.'
templates: all
prerequisite_stage: propose
next_stage: implement
human_gate: false
agent:
  primary: lincoln-pm
  reviewers:
  - lincoln-engineer
  - lincoln-qa
  handoff_to: lincoln-engineer
skills:
  required:
  - superpowers:dispatching-parallel-agents
  optional:
  - gsd:phase
  - oh-my-claudecode:team
artifacts:
  required:
  - .github/linked-issues.yaml
context:
  goal: 将 OpenSpec 变更提案中的 tasks 拆分为可执行的 GitHub Issues，建立从需求到代码追踪的完整链路。
  constraints: '- 仅通过 scripts/stage_loader.py 更新 {process_slug}/workflow-stage.yaml。

    - 禁止修改 {process_slug}/recordings/ 中的原始文件。

    - 门控评估优先使用 AI 能力：读取产物并推理其完整性，而非仅依赖脚本化检查。

    - 详细执行步骤、模板与工具见对应 skill prompt 和 .claude/agents/<primary_agent>.md。'
gates:
  entry:
  - check: previous_stage_completed
    args:
    - propose
  exit:
  - check: artifacts_present
