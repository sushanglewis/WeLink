projects:
  - name: OpenWhispr/OpenWhispr
    url: https://github.com/OpenWhispr/OpenWhispr
    license: MIT
    fit_score: 4.5
    status: recommended
    notes: |
      Cross-platform (macOS/Windows/Linux) Electron voice dictation + meeting
      transcription app. Local Whisper/Parakeet transcription, local speaker
      diarization with voice fingerprinting, local HTTP bridge (127.0.0.1),
      and MCP server. ~4.4k stars, actively maintained. Best balance of
      maturity and Lincoln constraints.

  - name: fastrepl/anarlog
    url: https://github.com/fastrepl/anarlog
    license: MIT
    fit_score: 3.0
    status: reference_only
    notes: |
      Rust/Tauri local-first meeting notetaker, ~8.8k stars. Saves notes as
      Markdown on disk. Lacks robust speaker diarization today.

  - name: Zackriya-Solutions/meetily
    url: https://github.com/Zackriya-Solutions/meetily
    license: MIT
    fit_score: 3.5
    status: reference_only
    notes: |
      Most popular (~22.2k stars) local meeting assistant. License is safe,
      but speaker diarization is currently only planned for the PRO tier and
      there is no stable CLI/API. Not a drop-in replacement today.

  - name: Hankanman/Meetily-Local
    url: https://github.com/Hankanman/Meetily-Local
    license: MIT
    fit_score: 2.8
    status: excluded
    notes: |
      Meetily fork, still desktop-only without public API/CLI.

  - name: pasrom/meeting-transcriber
    url: https://github.com/pasrom/meeting-transcriber
    license: MIT
    fit_score: 3.4
    status: fallback
    notes: |
      Native macOS Swift app with excellent local diarization and localhost
      HTTP API, but only ~19 stars and a solo side project. Risky as primary
      dependency; keep as macOS-only fallback if OpenWhispr integration fails.

  - name: Vexa-ai/vexa
    url: https://github.com/Vexa-ai/vexa
    license: Apache-2.0
    fit_score: 3.4
    status: future_bot_candidate
    notes: |
      API-first meeting bot with self-hosted option. Strong for cloud/bot
      scenarios, violates current local desktop + offline constraints.

  - name: pretyflaco/millet
    url: https://github.com/pretyflaco/millet
    license: GPL-3.0
    fit_score: 2.6
    status: excluded
    notes: |
      Fully offline Python pipeline with diarization. Copyleft license risk;
      audio capture currently Linux-only.

  - name: screenappai/meeting-bot
    url: https://github.com/screenappai/meeting-bot
    license: MIT
    fit_score: 3.0
    status: excluded
    notes: |
      Lightweight Dockerized meeting bot. Cloud/bot architecture, not local.

  - name: meetingbot/meetingbot
    url: https://github.com/meetingbot/meetingbot
    license: LGPL-3.0
    fit_score: 2.6
    status: excluded
    notes: |
      AWS-centric full-stack reference app. Heavier operational footprint and
      copyleft concerns.
